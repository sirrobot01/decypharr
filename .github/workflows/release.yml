name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY_GHCR: ghcr.io/sirrobot01/decypharr
  REGISTRY_HUB: docker.io/cy01/blackhole
  LDFLAGS_PKG: github.com/sirrobot01/decypharr/pkg/version

jobs:
  # Determine release channel from tag
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
    steps:
      - name: Extract version and channel
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-beta"* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *"-rc"* ]]; then
            echo "channel=rc" >> "$GITHUB_OUTPUT"
          else
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          fi

  # Build Linux binaries (CGO required for FUSE + rapidyenc)
  build-linux:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: amd64
            cc: gcc
            cxx: g++
          - arch: arm64
            cc: zig cc -target aarch64-linux-gnu
            cxx: zig c++ -target aarch64-linux-gnu
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Zig
        if: matrix.arch == 'arm64'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install libfuse-dev
        run: sudo apt-get update && sudo apt-get install -y libfuse-dev

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          VERSION: ${{ needs.prepare.outputs.version }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X ${LDFLAGS_PKG}.Version=${VERSION} -X ${LDFLAGS_PKG}.Channel=${CHANNEL}" \
            -o dist/decypharr

      - name: Package
        run: |
          ARCH="${{ matrix.arch }}"
          [ "$ARCH" = "amd64" ] && ARCH="x86_64"
          tar czf "dist/decypharr_Linux_${ARCH}.tar.gz" -C dist decypharr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/decypharr_Linux_*.tar.gz

  # Build Windows binary (no CGO — cgofuse uses syscall.LoadLibrary for WinFsp)
  build-windows:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
          VERSION: ${{ needs.prepare.outputs.version }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X ${LDFLAGS_PKG}.Version=${VERSION} -X ${LDFLAGS_PKG}.Channel=${CHANNEL}" \
            -o dist/decypharr.exe

      - name: Package
        working-directory: dist
        run: zip decypharr_Windows_x86_64.zip decypharr.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/decypharr_Windows_x86_64.zip

  # Build macOS binaries (CGO required, needs macFUSE headers)
  build-darwin:
    runs-on: macos-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: amd64
            label: x86_64
          - arch: arm64
            label: arm64
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install macFUSE headers
        run: brew install macfuse

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.prepare.outputs.version }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X ${LDFLAGS_PKG}.Version=${VERSION} -X ${LDFLAGS_PKG}.Channel=${CHANNEL}" \
            -o dist/decypharr

      - name: Package
        run: tar czf "dist/decypharr_Darwin_${{ matrix.label }}.tar.gz" -C dist decypharr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.arch }}
          path: dist/decypharr_Darwin_*.tar.gz

  # Build and push multi-platform Docker images
  docker:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            CHANNEL=${{ needs.prepare.outputs.channel }}
          tags: |
            ${{ env.REGISTRY_GHCR }}:${{ github.ref_name }}
            ${{ env.REGISTRY_GHCR }}:latest
            ${{ env.REGISTRY_HUB }}:${{ github.ref_name }}
            ${{ env.REGISTRY_HUB }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create GitHub release with all binaries
  release:
    runs-on: ubuntu-latest
    needs: [ prepare, build-linux, build-windows, build-darwin ]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          PRERELEASE=""
          if [ "$CHANNEL" != "stable" ]; then
            PRERELEASE="--prerelease"
          fi

          gh release create "$TAG" dist/* \
            --title "decypharr ${TAG}" \
            --generate-notes \
            $PRERELEASE \
            --notes-start-tag "$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")"
